<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Apple Podcastsで開く</title></head>
<body style="font-family:sans-serif;max-width:640px;margin:40px auto;padding:0 20px;color:#333;">
<h2>Apple Podcastsを開いています…</h2>
<p id="fallback" style="display:none;">
自動で開かない場合は、下のフィードURLをコピーして Apple Podcasts の
「ライブラリ」→「…」→「URLから番組を追加」に貼り付けてください。<br><br>
<code id="feed" style="word-break:break-all;background:#f1f1f1;padding:8px 10px;display:inline-block;border-radius:6px;"></code>
</p>
<script>
(function(){
  var raw = decodeURIComponent((location.hash || "").slice(1));
  if (!raw) { document.getElementById("fallback").style.display="block"; return; }
  document.getElementById("feed").textContent = raw;
  // https/http → podcast:// に変換して Podcasts アプリを開く
  var deep = raw.replace(/^https?:\/\//, "podcast://");
  location.href = deep;
  setTimeout(function(){ document.getElementById("fallback").style.display="block"; }, 1200);
})();
</script>
</body></html>
